<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>
      链接教学的及时训练  
    </title>
</head>
<body>
    <p>
        <a href="https://www.baidu.com">百度</a>这是一个指向百度的链接
        <a href="https://cn.bing.com">必应（中国版）</a>这是指向必应（中国版）的链接
    </p><!--a标签设置超文本链接，同时href标签表述链接的地址-->
    <p><!--现在学习target属性-->
        <a href="https://www.baidu.com"target="_blank">新窗口（或新标签页）打开百度</a>
        <a href="https://www.baidu.com"target="_self">在当前窗口（或标签页）打开百度</a>
    </p><!--其余属性用到了在学，先学两个简单的-->

</body>
